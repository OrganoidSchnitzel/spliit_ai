name: Build and Publish Docker Image

# Triggers on EVERY branch push AND every published release
on:
  push:
    branches: [ "**" ] 
  release:
    types: [ "published" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: organoidschnitzel/spliit_ai

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 1. Always tag with the branch name (e.g., :dev, :main)
            type=ref,event=branch
            # 2. If it's a release, tag with the release version (e.g., :v0.3)
            type=ref,event=tag
            # 3. ONLY update the 'latest' tag if a formal Release was published!
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
